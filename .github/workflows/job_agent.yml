name: Job Agent - Auto Apply Pipeline

on:
  schedule:
    - cron: '0 * * * *'   # runs every hour
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  run-job-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore applied jobs tracker
        uses: actions/cache@v4
        with:
          path: applied_jobs.json
          key: applied-jobs-${{ github.run_id }}
          restore-keys: applied-jobs-

      - name: Run Job Agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NAUKRI_EMAIL: ${{ secrets.NAUKRI_EMAIL }}
          NAUKRI_PASSWORD: ${{ secrets.NAUKRI_PASSWORD }}
          GMAIL_CREDENTIALS: ${{ secrets.GMAIL_CREDENTIALS }}
          RESUME_SUMMARY: ${{ secrets.RESUME_SUMMARY }}
        run: |
          cd src
          python job_agent.py

      - name: Save applied jobs tracker
        if: always()
        uses: actions/cache@v4
        with:
          path: applied_jobs.json
          key: applied-jobs-${{ github.run_id }}
